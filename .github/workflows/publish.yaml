name: Publish To BCR

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string

jobs:
  publish_to_bcr:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@0a23c53c2baffdaf2ce8dd23c2c0e45eb3b79093 # v1.2.0
    with:
      tag_name: ${{ inputs.tag_name }}
      registry_fork: saeid-rez/bazel-central-registry
      attest: false
      author_name: Saeid Rezaeisadrabadi
      author_email: saeed.rezaei.sa@gmail.com
    permissions:
      contents: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
